default_install_hook_types: [pre-commit, pre-push, commit-msg]

repos:
  - repo: local
    hooks:
      # Run the linter.
      - id: ruff-linter
        name: ruff linter
        entry: ruff check --force-exclude
        language: python
        types: [python]
        additional_dependencies: [ruff]
        args: [ --fix ]
        stages: [pre-commit]
      # Run the formatter.
      - id: ruff-format
        name: ruff format
        entry: ruff format --force-exclude
        language: python
        additional_dependencies: [ruff]
        types: [python]
        stages: [pre-commit]
      # Deadcode check (vulture)
      - id: vulture
        name: vulture (deadcode)
        entry: vulture
        language: python
        types: [python]
        additional_dependencies: [vulture]
        stages: [pre-commit]
      # Terraform formatting
      - id: terraform-fmt
        name: Terraform Format
        entry: terraform fmt
        language: system
        files: \.tf(vars)?$
        pass_filenames: true
        stages: [pre-commit]
      # Unit tests
      - id: pytest
        name: pytest
        entry: pytest tests -v
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      - id: bandit
        name: Bandit
        entry: bandit -r .
        language: python
        require_serial: true
        stages: [pre-push]
      - id: conventional-pre-commit
        name: Conventional Commit
        entry: conventional-pre-commit
        language: python
        stages: [commit-msg]
        args: [] # optional: list of Conventional Commits types to allow e.g. [feat, fix, ci, chore, test]
